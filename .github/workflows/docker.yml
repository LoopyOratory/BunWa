name: Docker Build & Push

# Builds the production image (Dockerfile) and pushes it to Docker Hub.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  — your Docker Hub account name (used for `docker login`)
#   DOCKERHUB_TOKEN     — a Docker Hub access token with Read/Write scope
#                         (create at https://hub.docker.com/settings/security)
#
# Image tags produced:
#   push to main        → :latest, :main, :sha-<short>
#   push tag v1.2.3     → :1.2.3, :1.2, :sha-<short>
#   manual run          → :sha-<short> (+ :latest if run from main)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Target architectures to build'
        type: choice
        default: linux/amd64,linux/arm64
        options:
          - linux/amd64,linux/arm64
          - linux/amd64
          - linux/arm64

env:
  # Full Docker Hub image reference: <namespace>/<repository>.
  # Change the repository part here if you want a different image name.
  IMAGE_NAME: loopyoratory/bunwa

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # For push/tag events (no inputs), default to building both archs.
      - name: Resolve target platforms
        id: platforms
        run: echo "value=${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64' }}" >> "$GITHUB_OUTPUT"

      # QEMU enables cross-building arm64 on the amd64 runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ steps.platforms.outputs.value }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions layer cache — makes repeat builds much faster.
          cache-from: type=gha
          cache-to: type=gha,mode=max
